<!DOCTYPE html>
<title>Shuffle</title>
<style>
  @view-transition {
    navigation: auto;
  }
</style>
<script>
  const postsIds = ${Tree.json(Tree.map(_.items, (post) => `/n/${post.id}/`))};
  // randomly select one of the postsIds
  const randomPostId = postsIds[Math.floor(Math.random() * postsIds.length)];
  window.location.href = randomPostId;
</script>
