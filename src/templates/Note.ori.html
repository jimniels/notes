<!-- ( _ : {Note} ) -->
<article id="${_.id}" data-tags="${_.tags ? _.tags.join(' ') : ''}">
  <header>
    <h1><a href="${_.external_url}">${_.title}</a></h1>
    <p class="byline">
      <span class="highlight">${_._external_url_domain}</span>
    </p>
  </header>
  ${_.content_html}
  <footer class="de-emphasized">
    <ul>
      <li>
        <a href="/n/${_.id}/"
          ><time datetime="${_.date_published}"
            >${formatDate.js(_.date_published)}</time
          ></a
        >
      </li>

      ${_.tags ? Tree.map(_.tags, (tag) => `
      <li>#${tag}</li>
      `) : ""}
    </ul>
  </footer>
</article>
