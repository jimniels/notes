<!DOCTYPE html>
<!-- ( _ : { path: string, site: Site,children: string, title: string, head?: string } ) -->
<html lang="en" data-theme="Notes" id="top">
  <head>
    <meta charset="UTF-8" />
    <title>${_.title}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />

    <!-- Feeds (in order of my preference for RSS readers) -->
    <link
      rel="alternate"
      type="application/json"
      title="JSON Feed"
      href="/feed.json"
    />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="RSS Feed"
      href="/feed.xml"
    />

    <!-- Me links -->
    <link rel="me" href="https://github.com/jimniels" />
    <link rel="me" href="https://twitter.com/jimniels" />
    <link rel="me" href="https://mastodon.social/@jimniels" />
    <link rel="me" href="https://dribbble.com@jimniels" />

    <!--
      Handle redirects for old URLs on the home page
      - Check if there's a hash in the url
      - If there is, check if it matches this pattern: 
        YYYY-MM-DDTHHMM, e.g. '#2012-07-09T0914'
      - If it does, redirect to 'YYYY-MM-DD-HHMM'
    -->
    <script>
      if (window.location.pathname === "/" && window.location.hash) {
        const hash = window.location.hash.trim();
        console.log("hash", hash);
        const match = hash.match(/^#(\\d{4}-\\d{2}-\\d{2})T(\\d{4})$/);
        if (match) {
          const href = "/n/" + match[1] + "-" + match[2] + "/";
          location.replace(href);
        }
      }
    </script>

    ${_.head ? _.head : ''}
  </head>
  <body>
    <nav>
      <div class="btn-group">
        <a
          href="/"
          title="Home"
          aria-label="Home"
          aria-current="${_.path=== '/' ? 'page' : 'false'}"
          >${<templates/icons.ori/home>}</a
        >
        <a
          href="/links/"
          title="Links"
          aria-label="Links"
          aria-current="${_.path === '/links/' ? 'page' : 'false'}"
          >${<templates/icons.ori/link>}</a
        >
        <a
          href="/n/"
          title="Search"
          aria-label="Search"
          aria-current="${_.path === '/n/' ? 'page' : 'false'}"
          >${<templates/icons.ori/search>}</a
        >
        <a
          href="/subscribe/"
          title="Subscribe"
          arial-label="Subscribe"
          aria-current="${_.path === '/subscribe/' ? 'page' : 'false'}"
          >${<templates/icons.ori/rss>}</a
        >
      </div>

      <a
        href="/shuffle/"
        title="Shuffle"
        aria-label="Shuffle"
        class="btn"
        aria-current="${_.path === '/shuffle/' ? 'page' : 'false'}"
      >
        ${_.path === '/shuffle/' ? `${<templates/icons.ori/loading>} Shuffling`
        : <templates/icons.ori/shuffle>}
      </a>
    </nav>

    ${_.children}

    <!-- Handles the edit link for my own personal use -->
    <script src="/edit-link.js" type="module"></script>
  </body>
</html>
